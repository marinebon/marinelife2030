<header class="site-header">
  <div class="container header-inner">
    <a class="logo" href="{{ "/" | relURL }}">
      <img src="{{ "/images/ML2030_LogoColor300ppi.png" | relURL }}" alt="{{ .Site.Title }}" width="180" height="150">
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="main-nav" aria-label="Main navigation">
      <ul>
        {{ range .Site.Menus.main }}
        {{ if not .Parent }}
        <li{{ if .HasChildren }} class="has-dropdown"{{ end }}>
          {{ if .HasChildren }}
          <button type="button" class="nav-dropdown-toggle" aria-expanded="false" aria-haspopup="true">
            {{ .Name }}
            <span class="nav-chevron" aria-hidden="true"></span>
          </button>
          <ul class="nav-dropdown">
            {{ range .Children }}
            <li>
              <a href="{{ .URL | relURL }}"{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) (eq $.RelPermalink (.URL | relURL)) }} class="active"{{ end }}>{{ .Name }}</a>
            </li>
            {{ end }}
          </ul>
          {{ else }}
          <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
          {{ end }}
        </li>
        {{ end }}
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
