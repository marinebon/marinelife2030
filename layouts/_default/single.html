{{ define "main" }}
<article class="page-content container">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Date }}
    <p class="meta">
      <time datetime="{{ .Format "2006-01-02" }}">{{ .Format "January 2, 2006" }}</time>
      {{ with $.Params.author }}&middot; {{ . }}{{ end }}
    </p>
    {{ end }}
  </header>
  <div class="prose">
    {{ .Content }}
  </div>
</article>
{{ end }}
